services:
  - type: web
    name: ai-career-assistant-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt && python -m spacy download en_core_web_sm
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --timeout 120
    envVars:
      - key: FLASK_ENV
        value: production
      - key: AIOS_BEDROCK_REGION
        value: us-east-1
      - key: BEDROCK_MODEL_ID
        value: anthropic.claude-3-haiku-20240307-v1:0
      - key: ALLOWED_ORIGINS
        value: https://ai-career-assistant.vercel.app,http://localhost:5173
